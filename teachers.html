<main class="wrapper page-hero"><section class="page-heading"><div><h1>Расписание учителей</h1><p>Выберите педагога, чтобы открыть расписание по дням недели.</p><div class="date" id="current-date"></div></div><div class="quick-line"><a href="classes.html" class="btn btn-primary">Классы</a><a href="index.html" class="btn btn-light">На главную</a></div></section></main>
<div class="wrapper page-section"><section class="selector-card"><p class="selector-title">Выберите учителя</p><div class="class-buttons" id="teacher-buttons"></div></section><div id="schedule-output" class="card-grid"></div></div><footer class="footer"><div class="wrapper footer-inner"><strong>МОУ СОШ №20, Тверь</strong><p>Расписание, изменения и школьное сообщество «Вектор 20»</p></div></footer>
<script>
    const now = new Date();
    const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
    document.getElementById('current-date').textContent = now.toLocaleDateString('ru-RU', options);

    const CONFIG = {
      SHEET_ID: '1Va5atMLtrqb9JEXE7d9eytoTUFgN-lwT0xlYOevm4S4',
      SHEET_NAME: 'Учителя',
      API_KEY: 'AIzaSyDGhaQXvcEv-QvHRDHP_8Q9gVEvzd6fuFI'
    };

    async function loadTeachers() {
      const url = `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SHEET_ID}/values/${CONFIG.SHEET_NAME}?key=${CONFIG.API_KEY}`;
      try {
        const res = await fetch(url);
        const data = await res.json();
        console.log('DATA:', data);

        const [headers, ...rows] = data.values;
        const teacherMap = {};

        rows.forEach(row => {
          const name = row[0];
          const lessonNum = row[1];
          if (!name || !lessonNum) return;

          if (!teacherMap[name]) teacherMap[name] = {};
          for (let i = 2; i < headers.length; i++) {
            const day = headers[i];
            const cell = row[i];
            if (cell) {
              if (!teacherMap[name][day]) teacherMap[name][day] = [];
              teacherMap[name][day].push(`${lessonNum}. ${cell}`);
            }
          }
        });

        const container = document.getElementById('teacher-buttons');
        Object.keys(teacherMap).forEach(name => {
          const btn = document.createElement('button');
          btn.textContent = name;
          btn.className = 'class-btn';
          btn.addEventListener('click', () => renderSchedule(name, teacherMap[name]));
          container.appendChild(btn);
        });

      } catch (err) {
        console.error('Ошибка:', err);
        document.getElementById('schedule-output').textContent = 'Ошибка загрузки данных.';
      }
    }

    function renderSchedule(name, data) {
      const dayNames = {
        'ПН': 'Понедельник',
        'ВТ': 'Вторник',
        'СР': 'Среда',
        'ЧТ': 'Четверг',
        'ПТ': 'Пятница',
        'СБ': 'Суббота',
        'ВС': 'Воскресенье'
      };

      const output = document.getElementById('schedule-output');
      let html = '';

      for (let day in data) {
        const prettyDay = dayNames[day] || day;
        html += `<div class="day-card">
          <h3>${prettyDay}</h3>
          <ul>${data[day].map(item => `<li>${item}</li>`).join('')}</ul>
        </div>`;
      }

      output.innerHTML = html;
    }

    loadTeachers();
  </script>
</body></html>
